<!DOCTYPE html>
<html>
<body>
    <button onclick="testAi()">Test Connection</button>
    <div id="res">Waiting...</div>

    <script>
        async function testAi() {
            const res = document.getElementById('res');
            res.innerText = "Connecting...";
            try {
                const r = await fetch('/api/get-sensi', { method: 'POST', body: "{}" });
                const d = await r.json();
                res.innerText = "Response: " + d.text;
            } catch(e) { 
                res.innerText = "CRITICAL ERROR: " + e.message; 
            }
        }
    </script>
</body>
</html>
