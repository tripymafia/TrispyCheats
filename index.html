<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripsy Cheats - Premium Sensi</title>
    <script>
    // USE THIS UPDATED FETCH FUNCTION INSIDE YOUR SCRIPT TAGS
    async function fetchApiSensi() {
        const device = document.getElementById('device-info').value.trim();
        const resBox = document.getElementById('sensi-result');
        
        if (!device) {
            resBox.innerHTML = 'Please enter a device model.';
            return;
        }
        
        resBox.innerHTML = '⚡ Connecting...';
        
        try {
            const response = await fetch('/api/get-sensi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device: device })
            });

            const data = await response.json();

            if (response.ok) {
                resBox.innerHTML = `🌟 <b>AI CONFIG:</b>\n\n${data.text}`;
            } else {
                resBox.innerHTML = `<span style="color:#ff3333">❌ ${data.text}</span>`;
            }
        } catch (error) {
            resBox.innerHTML = '<span style="color:#ff3333">❌ Connection Error.</span>';
        }
    }
    </script>
</head>
<body>
    </body>
</html>
