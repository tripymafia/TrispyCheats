<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripsy Sensi Premium</title>
    <style>
        /* Base & Background */
        body { margin: 0; background: #070709; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Star Animation */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: #000 url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIxIiBmaWxsPSIjZmZmIi8+PGNpcmNsZSBjeD0iMTUwIiBjeT0iMTUwIiByPSIxLjUiIGZpbGw9IiNmZmYiLz48Y2lyY2xlIGN4PSIzMDAiIGN5PSI4MCIgcj0iMiIgZmlsbD0iI2ZmZiIvPjwvc3ZnPg==') repeat top center; animation: move-twink 150s linear infinite; }
        @keyframes move-twink { from {background-position:0 0;} to {background-position:-10000px 5000px;} }
        
        /* Floating Window / Logo */
        #floating-logo { position: fixed; top: 15px; left: 15px; z-index: 9999; background: rgba(20, 20, 25, 0.9); border: 2px solid #ff007f; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #ff007f; box-shadow: 0 0 10px #ff007f; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Crosshair Overlay (Centered) */
        #crosshair-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-size: 30px; font-weight: bold; display: none; pointer-events: none; z-index: 10000; text-shadow: 0 0 5px #000; }
        
        .page { padding: 20px; display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Containers */
        .center-screen { display: flex; height: 100vh; justify-content: center; align-items: center; flex-direction: column; }
        .box { background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(8px); padding: 25px; border-radius: 15px; border: 1px solid #7928ca; box-shadow: 0 0 20px rgba(121, 40, 202, 0.3); width: 100%; max-width: 400px; position: relative; margin: 0 auto; }
        
        /* Colorful Animated Texture Text */
        .animated-title { font-size: 2.4rem; font-weight: 900; text-align: center; margin-top: 10px; margin-bottom: 20px; background: linear-gradient(to right, #ff007f, #7928ca, #00d2ff, #7928ca, #ff007f); background-size: 200% auto; color: #fff; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; text-transform: uppercase; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .pro-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #ff007f; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; box-shadow: 0 0 10px #ff007f; }

        /* YT Logo Button */
        .yt-logo { display: flex; align-items: center; justify-content: center; background: #ff0000; padding: 10px 20px; border-radius: 30px; text-decoration: none; color: white; font-weight: bold; gap: 10px; box-shadow: 0 0 15px rgba(255,0,0,0.5); width: max-content; margin: 0 auto 15px auto; }
        
        /* Inputs & Buttons */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: #7928ca; box-shadow: 0 0 8px #7928ca; }
        
        button.action-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: linear-gradient(45deg, #7928ca, #ff007f); color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button.action-btn:hover { box-shadow: 0 0 15px #ff007f; }
        
        /* Tabs */
        .nav { display: flex; gap: 8px; margin-bottom: 20px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .nav button { flex: 1; background: #222; border: none; color: #aaa; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav button.active { background: linear-gradient(45deg, #7928ca, #ff007f); color: #fff; box-shadow: 0 0 10px #7928ca; }
        
        /* Results & Grids */
        #res { background: rgba(0,0,0,0.8); padding: 20px; margin-top: 15px; color: #00ffcc; white-space: pre-wrap; border-radius: 8px; border-left: 4px solid #ff007f; line-height: 1.8; font-size: 15px; }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .feature-btn { padding: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .feature-btn.on { background: #00c853; border-color: #00e676; box-shadow: 0 0 10px #00c853; }
    </style>
</head>
<body>

<div class="stars"></div>
<div id="floating-logo">TRIPSY</div>
<div id="crosshair-overlay">+</div>

<div id="login-screen" class="page center-screen" style="display: flex;">
    <div class="box">
        <div class="pro-badge">PRO SEC V3</div>
        <h2 class="animated-title">TRIPSY LOGIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="action-btn" onclick="check()">INJECT LOGIN</button>
    </div>
</div>

<div id="main-app" class="page">
    
    <a href="https://youtube.com" target="_blank" class="yt-logo">
        <svg viewBox="0 0 24 24" fill="white" width="20px" height="20px"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
        SUBSCRIBE
    </a>

    <h1 class="animated-title">TRIPSY SENSI</h1>
    
    <div class="nav">
        <button class="active" id="btn-sensi" onclick="showTab('sensi-tab', 'btn-sensi')">AI SENSI</button>
        <button id="btn-esp" onclick="showTab('esp-tab', 'btn-esp')">ESP/AIM</button>
        <button id="btn-cross" onclick="showTab('cross-tab', 'btn-cross')">CROSSHAIR</button>
    </div>

    <div id="sensi-tab" class="tab">
        <div class="box">
            <input type="text" id="dev" placeholder="Enter Device (e.g. iPhone 14, Realme)">
            <button class="action-btn" onclick="calc()">GENERATE PRO SENSI</button>
            <div id="res">Awaiting device input...</div>
        </div>
    </div>

    <div id="esp-tab" class="tab" style="display:none;">
        <div class="box feature-grid">
            <button class="feature-btn" onclick="toggleBtn(this, 'ESP Radar')">ESP Radar</button>
            <button class="feature-btn" onclick="toggleBtn(this, 'ESP Line')">ESP Line</button>
            <button class="feature-btn" onclick="toggleBtn(this, 'Aim Assist')">Aim Assist</button>
            <button class="feature-btn" onclick="toggleBtn(this, 'Auto Headshot')">Auto Headshot</button>
            <button class="feature-btn" onclick="toggleBtn(this, 'No Recoil')">No Recoil</button>
            <button class="feature-btn" onclick="toggleBtn(this, 'High Damage')">High Damage</button>
        </div>
    </div>

    <div id="cross-tab" class="tab" style="display:none;">
        <div class="box">
            <h3 style="text-align:center; color:#fff; margin-top:0;">Crosshair Color Setup</h3>
            <input type="color" id="cross-color" value="#00ffcc" style="height: 60px; padding: 0; border:none; border-radius: 8px;">
            <button class="action-btn" onclick="applyCrosshair()">ENABLE CROSSHAIR</button>
            <button class="action-btn" style="background: #333;" onclick="disableCrosshair()">DISABLE</button>
        </div>
    </div>
</div>

<script>
    // Security Login
    function check() {
        if(document.getElementById('user').value === 'Trispy' && document.getElementById('pass').value === 'Trispy01') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { alert('Pro Sec: Access Denied! Incorrect Credentials.'); }
    }

    // Tab Navigation
    function showTab(tabId, btnId) {
        document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        document.getElementById(btnId).classList.add('active');
    }

    // AI Generation
    async function calc() {
        const device = document.getElementById('dev').value.trim();
        const res = document.getElementById('res');
        if(!device) return alert('Please enter a device model!');
        
        res.innerText = "⚡ Initializing AI Engine...\nAnalyzing Hardware...";
        try {
            const r = await fetch('/api/get-sensi', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ device: device })
            });
            const d = await r.json();
            res.innerText = d.text;
        } catch(e) { 
            res.innerText = "Error: Connection failed. Verify Vercel deployment."; 
        }
    }

    // ESP Toggle Logic
    function toggleBtn(btn, name) {
        btn.classList.toggle('on');
        if(btn.classList.contains('on')) {
            btn.innerText = name + ' [ON]';
        } else {
            btn.innerText = name;
        }
    }

    // Crosshair Logic
    function applyCrosshair() {
        const color = document.getElementById('cross-color').value;
        const cross = document.getElementById('crosshair-overlay');
        cross.style.color = color;
        cross.style.display = 'block';
        alert('Custom Crosshair injected to screen center.');
    }
    
    function disableCrosshair() {
        document.getElementById('crosshair-overlay').style.display = 'none';
    }
</script>
</body>
</html>
