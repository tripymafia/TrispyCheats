<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripsy Cheats</title>
    <style>
        body { margin: 0; background: #0b0b0c; color: #fff; font-family: sans-serif; }
        .page { padding: 20px; }
        #main-app { display: none; }
        .box { background: #1c1c21; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input, button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #ff007f; color: white; cursor: pointer; font-weight: bold; }
        #res { background: #000; padding: 15px; margin-top: 10px; color: #00ffcc; white-space: pre-wrap; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen" class="page">
    <div class="box">
        <h2>Security Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="check()">UNLOCK ACCESS</button>
    </div>
</div>

<div id="main-app" class="page">
    <h1>Tripsy Cheats</h1>
    <div class="box">
        <input type="text" id="dev" placeholder="Enter Phone Model">
        <button onclick="calc()">Get Best Settings</button>
        <div id="res">Ready...</div>
    </div>
</div>

<script>
    function check() {
        if(document.getElementById('user').value === 'Trispy' && document.getElementById('pass').value === 'Trispy01') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { alert('Access Denied!'); }
    }

    async function calc() {
        const device = document.getElementById('dev').value.trim();
        const res = document.getElementById('res');
        if(!device) return alert('Enter model');
        
        res.innerText = "⚡ Analyzing...";
        try {
            const r = await fetch('/api/get-sensi', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ device: device })
            });
            const d = await r.json();
            res.innerText = d.text;
        } catch(e) { res.innerText = "Error: API connection failed."; }
    }
</script>
</body>
</html>
