<!DOCTYPE html>
<html>
<body>
    <input type="text" id="dev" placeholder="Phone Model">
    <button onclick="testAi()">Test AI</button>
    <div id="res">Waiting...</div>

    <script>
        async function testAi() {
            const dev = document.getElementById('dev').value;
            const res = document.getElementById('res');
            res.innerText = "Connecting...";
            try {
                const r = await fetch('/api/get-sensi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ device: dev })
                });
                const d = await r.json();
                res.innerText = d.text;
            } catch(e) { res.innerText = "Error: " + e.message; }
        }
    </script>
</body>
</html>
