<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tripsy Cheats - Premium</title>
    <style>
        body { margin: 0; background: #0a0a0c; color: #eaeaea; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .page { padding: 20px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; flex-direction: column; }
        
        /* Premium Purple & Luxury Styling */
        .box { background: #15151a; padding: 25px; border-radius: 12px; border: 1px solid #4a148c; box-shadow: 0 4px 20px rgba(74, 20, 140, 0.4); width: 100%; max-width: 400px; }
        h1, h2 { text-align: center; color: #ffd700; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0a0a0c; color: #fff; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: #9c27b0; }
        
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; background: linear-gradient(45deg, #6a1b9a, #9c27b0); color: #fff; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 10px #9c27b0; }
        
        .nav { display: flex; gap: 8px; margin-bottom: 25px; }
        .nav button { margin: 0; background: #222; color: #aaa; box-shadow: none; font-size: 14px; padding: 12px; }
        .nav button.active { background: linear-gradient(45deg, #ffd700, #ffb300); color: #15151a; font-weight: 900; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        #res { background: #000; padding: 20px; margin-top: 15px; color: #e0b0ff; white-space: pre-wrap; border-radius: 8px; font-weight: bold; border-left: 4px solid #ffd700; line-height: 1.5; }
        
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<!-- Security Login Screen -->
<div id="login-screen" class="page" style="display: flex;">
    <div class="box">
        <h2>Security Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="check()">UNLOCK ACCESS</button>
    </div>
</div>

<!-- Main Application -->
<div id="main-app" class="page">
    <h1>Tripsy Premium</h1>
    
    <!-- Navigation Tabs -->
    <div class="nav">
        <button class="active" id="btn-sensi" onclick="showTab('sensi-tab', 'btn-sensi')">AI Sensi</button>
        <button id="btn-esp" onclick="showTab('esp-tab', 'btn-esp')">ESP/Aim</button>
        <button id="btn-cross" onclick="showTab('cross-tab', 'btn-cross')">Crosshair</button>
    </div>

    <!-- AI Sensitivity Tab -->
    <div id="sensi-tab" class="tab">
        <div class="box">
            <input type="text" id="dev" placeholder="Enter Phone Model (e.g. iPhone 13)">
            <button onclick="calc()">Generate Sensi</button>
            <div id="res">Awaiting Device Input...</div>
        </div>
    </div>

    <!-- ESP & Cheats Tab -->
    <div id="esp-tab" class="tab" style="display:none;">
        <div class="box feature-grid">
            <button onclick="toggleFeature(this, 'ESP Radar')">ESP Radar</button>
            <button onclick="toggleFeature(this, 'ESP Line')">ESP Line</button>
            <button onclick="toggleFeature(this, 'Aim Assist')">Aim Assist</button>
            <button onclick="toggleFeature(this, 'Auto Headshot')">Auto Headshot</button>
            <button onclick="toggleFeature(this, 'No Recoil')">No Recoil</button>
            <button onclick="toggleFeature(this, 'High Damage')">High Damage</button>
        </div>
    </div>

    <!-- Crosshair & Settings Tab -->
    <div id="cross-tab" class="tab" style="display:none;">
        <div class="box">
            <input type="color" id="cross-color" value="#ffd700" style="height: 50px; padding: 5px;">
            <button onclick="applyCrosshair()">Apply Crosshair Color</button>
            <button onclick="alert('Settings Saved Successfully!')" style="background: #333;">Save All Settings</button>
        </div>
    </div>
</div>

<script>
    // 1. Security Login Logic
    function check() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if(u === 'Trispy' && p === 'Trispy01') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        } else { 
            alert('Access Denied! Incorrect Username or Password.'); 
        }
    }

    // 2. Tab Switching Logic
    function showTab(tabId, btnId) {
        document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        document.getElementById(btnId).classList.add('active');
    }

    // 3. AI Fetch Logic (Short Response Version)
    async function calc() {
        const device = document.getElementById('dev').value.trim();
        const res = document.getElementById('res');
        if(!device) return alert('Please enter a device model first.');
        
        res.innerText = "⚡ Analyzing Optimal Settings...";
        try {
            const r = await fetch('/api/get-sensi', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ device: device })
            });
            const d = await r.json();
            res.innerText = d.text;
        } catch(e) { 
            res.innerText = "Error: API connection failed. Please check Vercel limits."; 
        }
    }

    // 4. Feature Toggle Logic for UI
    function toggleFeature(btn, featureName) {
        if (btn.style.background === 'green') {
            btn.style.background = '';
            btn.innerText = featureName;
        } else {
            btn.style.background = 'green';
            btn.innerText = featureName + ' (ON)';
        }
    }

    // 5. Crosshair Alert Logic
    function applyCrosshair() {
        const color = document.getElementById('cross-color').value;
        alert('Custom Crosshair injected with color: ' + color);
    }
</script>
</body>
</html>
